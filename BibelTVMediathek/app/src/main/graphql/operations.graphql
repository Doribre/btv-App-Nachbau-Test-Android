# GraphQL-Operationen gegen den VideoHub (Beta). Felder gegen das echte Schema verifiziert.
# Alle Operationen tragen das Präfix "bre_testapp_", damit der Server die Herkunft erkennt
# (analog zur Bestands-App mit "Android_"; GraphQL-Namen erlauben keine Bindestriche,
#  daher Unterstriche statt "bre-testapp-"). Zusätzlich Header apollographql-client-name: bre-testapp.

fragment VideoCard on Video {
  id
  crn
  title
  subtitle
  description
  duration
  seasonNumber
  episodeNumber
  serie { id title }
  images { url category }
  genres { id name }
}

query bre_testapp_LiveStreams {
  liveStreams(where: { AND: [{ active: { equals: true } }, { onlineStatus: { equals: online } }] }) {
    id
    title
    description
    staticThumbnail
    liveThumbnail
    streamUrlHls
  }
}

query bre_testapp_NewestVideos($take: Int!, $skip: Int!, $now: DateTime!) {
  videos(
    orderBy: [{ hub_modifiedAt: desc }]
    take: $take
    skip: $skip
    where: {
      AND: [
        { active: { equals: true } }
        { isMediaLibrary: { equals: true } }
        { OR: [{ schedulingStart: { lte: $now } }, { schedulingStart: { equals: null } }] }
        { OR: [{ schedulingEnd: { gt: $now } }, { schedulingEnd: { equals: null } }] }
      ]
    }
  ) {
    ...VideoCard
  }
}

query bre_testapp_Genres {
  genres(where: { show: { equals: true } }) {
    id
    name
    videoCount
    currentScheduledVideoCount
  }
}

query bre_testapp_GenreVideos($genreId: Int!, $take: Int!, $skip: Int!, $now: DateTime!) {
  genre(where: { id: $genreId }) {
    id
    name
    videos(
      orderBy: [{ schedulingStart: desc }]
      take: $take
      skip: $skip
      where: {
        AND: [
          { active: { equals: true } }
          { OR: [{ schedulingStart: { lte: $now } }, { schedulingStart: { equals: null } }] }
          { OR: [{ schedulingEnd: { gt: $now } }, { schedulingEnd: { equals: null } }] }
        ]
      }
    ) {
      ...VideoCard
    }
  }
}

query bre_testapp_VideoPlayout($crn: String!) {
  videos(where: { crn: { equals: $crn } }) {
    id
    crn
    title
    drm
    videoUrls {
      src
      type
      keySystem { widevine { url } }
    }
  }
}

query bre_testapp_LiveStreamById($id: Int!) {
  liveStream(where: { id: $id }) {
    id
    title
    streamUrlHls
    streamUrlDash
  }
}

query bre_testapp_VideoDetail($crn: String!) {
  videos(where: { crn: { equals: $crn } }) {
    id
    crn
    title
    subtitle
    description
    descriptionLong
    duration
    seasonNumber
    episodeNumber
    fsk
    productionYear { from }
    serie { id title }
    genres { id name }
    images { url category }
  }
}

query bre_testapp_SearchVideos($q: String!, $take: Int!, $skip: Int!, $now: DateTime!) {
  videos(
    orderBy: [{ hub_modifiedAt: desc }]
    take: $take
    skip: $skip
    where: {
      AND: [
        { active: { equals: true } }
        { isMediaLibrary: { equals: true } }
        { OR: [{ schedulingStart: { lte: $now } }, { schedulingStart: { equals: null } }] }
        { OR: [{ schedulingEnd: { gt: $now } }, { schedulingEnd: { equals: null } }] }
        {
          OR: [
            { title: { contains: $q, mode: insensitive } }
            { subtitle: { contains: $q, mode: insensitive } }
            { description: { contains: $q, mode: insensitive } }
            { serie: { title: { contains: $q, mode: insensitive } } }
            { genres: { some: { name: { contains: $q, mode: insensitive } } } }
          ]
        }
      ]
    }
  ) {
    ...VideoCard
  }
}

query bre_testapp_SeriesDetail($id: Int!, $now: DateTime!) {
  serie(where: { id: $id }) {
    id
    title
    description
    descriptionLong
    images { url category }
    videos(
      orderBy: [{ seasonNumber: asc }, { episodeNumber: asc }]
      take: 100
      where: {
        AND: [
          { active: { equals: true } }
          { OR: [{ schedulingStart: { lte: $now } }, { schedulingStart: { equals: null } }] }
          { OR: [{ schedulingEnd: { gt: $now } }, { schedulingEnd: { equals: null } }] }
        ]
      }
    ) {
      ...VideoCard
    }
  }
}

# Videos, die Verse eines Kapitels referenzieren (VerseItem). prefix = "Joh 3,", exact = "Joh 3".
query bre_testapp_VerseVideos($prefix: String!, $exact: String!, $take: Int!, $now: DateTime!) {
  videos(
    orderBy: [{ hub_modifiedAt: desc }]
    take: $take
    where: {
      AND: [
        { active: { equals: true } }
        { verseItems: { some: { OR: [{ verse: { startsWith: $prefix } }, { verse: { equals: $exact } }] } } }
        { OR: [{ schedulingStart: { lte: $now } }, { schedulingStart: { equals: null } }] }
        { OR: [{ schedulingEnd: { gt: $now } }, { schedulingEnd: { equals: null } }] }
      ]
    }
  ) {
    ...VideoCard
    verseItems(where: { OR: [{ verse: { startsWith: $prefix } }, { verse: { equals: $exact } }] }) {
      verse
      time
    }
  }
}
